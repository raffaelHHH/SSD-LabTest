name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  eslint-security:
    name: ESLint Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run ESLint (eslint-plugin-security)
        run: npm run lint:security

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "ssd-test-password-app"
          path: "."
          format: "HTML"

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  integration-and-ui-tests:
    name: Integration & UI tests (over HTTP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start password app + database
        working-directory: wordpress-docker
        run: docker compose up -d --build passwordapp-db passwordapp

      - name: Wait for the app to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8081/ > /dev/null && exit 0
            sleep 2
          done
          echo "App never became ready" >&2
          exit 1

      - name: Run integration tests (PHP app + MySQL, over HTTP)
        run: bash wordpress-docker/password-app/tests/integration.sh

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run UI tests (over HTTP)
        run: npx playwright test
        env:
          BASE_URL: http://localhost:8081

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Tear down
        if: always()
        working-directory: wordpress-docker
        run: docker compose down -v
