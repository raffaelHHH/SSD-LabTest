services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wpnet

  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WORDPRESS_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
    volumes:
      - wp_data:/var/www/html
    networks:
      - wpnet

  # Runs once on startup: waits for WordPress + MySQL to be ready, then
  # finishes the install non-interactively so the admin account exists
  # with the credentials from .env instead of needing the setup wizard.
  wpcli:
    image: wordpress:cli
    depends_on:
      - wordpress
    volumes:
      - wp_data:/var/www/html
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
    entrypoint: ["sh", "-c"]
    command:
      - |
        until wp core is-installed --path=/var/www/html --allow-root >/dev/null 2>&1; do
          echo 'Waiting for WordPress to be installable...';
          wp --path=/var/www/html --allow-root core install \
            --url='${WORDPRESS_URL}' \
            --title='${WORDPRESS_TITLE}' \
            --admin_user='${WORDPRESS_ADMIN_USER}' \
            --admin_password='${WORDPRESS_ADMIN_PASSWORD}' \
            --admin_email='${WORDPRESS_ADMIN_EMAIL}' \
            --skip-email >/dev/null 2>&1;
          sleep 5;
        done;
        echo 'WordPress is installed and admin account is ready.';
    networks:
      - wpnet

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - wordpress
      - passwordapp
      - sonarqube
    ports:
      - "80:80"
      - "443:443"
      - "9000:9000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - wpnet

  # Writes the git commit identity into the Gitea data volume before Gitea
  # starts, so the server's git user (uid 1000) already has a ~/.gitconfig.
  gitea-init:
    image: busybox
    volumes:
      - gitea_data:/data
    entrypoint: ["sh", "-c"]
    command:
      - |
        mkdir -p /data/git
        cat > /data/git/.gitconfig <<EOF
        [user]
          name = ${GIT_USER_NAME}
          email = ${GIT_USER_EMAIL}
        EOF
        chown -R 1000:1000 /data/git

  gitea:
    image: gitea/gitea:latest
    restart: unless-stopped
    depends_on:
      gitea-init:
        condition: service_completed_successfully
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__server__DOMAIN: 127.0.0.1
      GITEA__server__SSH_DOMAIN: 127.0.0.1
      GITEA__server__ROOT_URL: http://127.0.0.1:${GITEA_HTTP_PORT}/
      GITEA__server__HTTP_PORT: 3000
      GITEA__server__SSH_PORT: ${GITEA_SSH_PORT}
      GITEA__server__START_SSH_SERVER: "false"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__security__INSTALL_LOCK: "true"
    volumes:
      - gitea_data:/data
    ports:
      - "${GITEA_HTTP_PORT}:3000"
      - "${GITEA_SSH_PORT}:22"
    networks:
      - wpnet

  # Dedicated database for the password-policy demo app: a blocklist of
  # commonly-used passwords (seeded from SecLists' NCSC list) and the
  # created-user log table.
  passwordapp-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${PWAPP_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${PWAPP_DB_NAME}
      MYSQL_USER: ${PWAPP_DB_USER}
      MYSQL_PASSWORD: ${PWAPP_DB_PASSWORD}
    volumes:
      - passwordapp_db_data:/var/lib/mysql
      - ./password-app/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${PWAPP_DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wpnet

  # SSD assignment demo: registration form enforcing OWASP Proactive
  # Controls C7 (Level 1 password requirements). Uses php:apache directly
  # instead of an nginx + php-fpm pair.
  passwordapp:
    build: ./password-app
    restart: unless-stopped
    depends_on:
      passwordapp-db:
        condition: service_healthy
    environment:
      DB_HOST: passwordapp-db
      DB_NAME: ${PWAPP_DB_NAME}
      DB_USER: ${PWAPP_DB_USER}
      DB_PASSWORD: ${PWAPP_DB_PASSWORD}
    volumes:
      - ./password-app/src:/var/www/html
    ports:
      - "${PWAPP_PORT}:80"
    networks:
      - wpnet

  sonarqube-db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SONARQUBE_DB_USER}
      POSTGRES_PASSWORD: ${SONARQUBE_DB_PASSWORD}
      POSTGRES_DB: ${SONARQUBE_DB_NAME}
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONARQUBE_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wpnet

  sonarqube:
    image: sonarqube:community
    restart: unless-stopped
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/${SONARQUBE_DB_NAME}
      SONAR_JDBC_USERNAME: ${SONARQUBE_DB_USER}
      SONAR_JDBC_PASSWORD: ${SONARQUBE_DB_PASSWORD}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - wpnet

  # One-shot: waits for SonarQube to be ready, then applies the admin
  # password from .env via the API (SonarQube ships with a default
  # admin/admin login and has no env var to set the password directly).
  # Safe to re-run: if the password was already changed on a previous
  # boot, the API call just fails harmlessly (wrong previous password).
  sonarqube-init:
    image: curlimages/curl
    depends_on:
      - sonarqube
    environment:
      SONARQUBE_ADMIN_PASSWORD: ${SONARQUBE_ADMIN_PASSWORD}
    entrypoint: ["sh", "-c"]
    command:
      - |
        until curl -sf http://sonarqube:9000/api/system/status | grep -q '"status":"UP"'; do
          echo 'Waiting for SonarQube to be ready...';
          sleep 5;
        done;
        curl -s -o /dev/null -u admin:admin -X POST http://sonarqube:9000/api/users/change_password \
          --data-urlencode "login=admin" \
          --data-urlencode "previousPassword=admin" \
          --data-urlencode "password=${SONARQUBE_ADMIN_PASSWORD}";
        echo 'Admin password set (or was already set on a previous run).';
    networks:
      - wpnet

networks:
  wpnet:

volumes:
  db_data:
  wp_data:
  gitea_data:
  passwordapp_db_data:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
